<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR Test - Hiro Mode</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
</head>

<body style="margin: 0; overflow: hidden;">
    <div id="debug-info" style="position: fixed; top: 10px; left: 10px; z-index: 100; color: red; background: rgba(255,255,255,0.7); padding: 5px; font-size: 12px;">
        状态: 正在初始化...
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <a-asset-item id="cup-m" src="cup-v6.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro" id="test-marker">
            <a-sphere position="0 0.5 0" radius="0.2" color="red"></a-sphere>
            <a-entity gltf-model="#cup-m" scale="0.1 0.1 0.1" position="0 0.1 0"></a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const marker = document.querySelector('#test-marker');
        const info = document.querySelector('#debug-info');
        
        // 实时监测是否识别到
        setInterval(() => {
            if (marker.getAttribute('visible') === true) {
                info.innerText = "状态: 成功识别 Hiro 标志！";
                info.style.color = "green";
            } else {
                info.innerText = "状态: 正在寻找 Hiro 标志...";
                info.style.color = "red";
            }
        }, 500);
    </script>
</body>
</html>
