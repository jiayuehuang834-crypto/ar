<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR Collection Game</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background-color: #000; }
        /* 启动界面 */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; transition: opacity 0.5s; }
        /* 计分板 */
        #score-ui { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); color: #00ffcc; font-size: 28px; font-weight: bold; z-index: 100; text-shadow: 0 0 10px rgba(0,255,204,0.5); pointer-events: none; letter-spacing: 2px; }
        /* 开始按钮 */
        button { padding: 18px 50px; font-size: 20px; background: #00ffcc; border: none; border-radius: 40px; color: #000; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(0,255,204,0.4); transition: transform 0.2s; }
        button:active { transform: scale(0.95); }
        .loading-hint { margin-top: 20px; font-size: 14px; color: #666; }
        /* 扫描提示 */
        #scan-hint { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 90; display: none; }
    </style>
</head>

<body>
    <div id="overlay">
        <h1 style="margin-bottom: 10px;">AR 蔬果采集</h1>
        <p style="color: #aaa; margin-bottom: 30px;">对准海报，倾斜手机控制杯子</p>
        <button id="start-btn">开启 AR 空间</button>
        <p class="loading-hint" id="status-text">正在加载 3D 资源...</p>
    </div>

    <div id="score-ui">SCORE: 00</div>
    <div id="scan-hint">请对准海报识别图</div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
        renderer="logarithmicDepthBuffer: true; colorManagement: true; antialias: true;"
        vr-mode-ui="enabled: false">
        
        <a-assets timeout="180000">
            <a-asset-item id="cup-m" src="cup-v6.glb"></a-asset-item>
            <a-asset-item id="apple-m" src="apple-v2.glb"></a-asset-item>
            <a-asset-item id="kale-m" src="kale-v3.glb"></a-asset-item>
            <a-asset-item id="kugua-m" src="kugua-v4.glb"></a-asset-item>
            <a-asset-item id="lemon-m" src="lemon-v5.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="./poster.patt" id="game-marker">
            <a-entity light="type: ambient; intensity: 1.0;"></a-entity>
            <a-entity light="type: directional; position: 1 5 1; intensity: 0.8;"></a-entity>

            <a-entity id="player-cup" 
                      gltf-model="#cup-m" 
                      scale="0.08 0.08 0.08" 
                      position="0 0.1 0"
                      rotation="0 0 0">
            </a-entity>

            <a-entity id="drop-zone"></a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        let score = 0;
        let cupX = 0;
        let isStarted = false;
        const player = document.querySelector('#player-cup');
        const dropZone = document.querySelector('#drop-zone');
        const marker = document.querySelector('#game-marker');
        const scanHint = document.querySelector('#scan-hint');
        const models = ['#apple-m', '#kale-m', '#kugua-m', '#lemon-m'];

        // 资源加载监控
        document.querySelector('a-assets').addEventListener('loaded', () => {
            document.getElementById('status-text').innerText = "资源已就绪";
        });

        // 游戏启动
        document.getElementById('start-btn').addEventListener('click', function() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').style.display = 'none'; }, 500);
            
            isStarted = true;
            scanHint.style.display = 'block';

            // 权限请求 (iOS)
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission();
            }
            
            startGameLoop();
        });

        // 核心移动逻辑：陀螺仪
        window.addEventListener('deviceorientation', (e) => {
            if(!isStarted || !marker.getAttribute('visible')) return;
            
            let tilt = e.gamma; // 手机左右倾斜角度
            if(Math.abs(tilt) > 1) {
                cupX += tilt * 0.008; // 调整感应灵敏度
                cupX = Math.max(-1.3, Math.min(1.3, cupX)); // 限制在海报宽度内
                player.setAttribute('position', `${cupX} 0.1 0`);
                // 增加微小的旋转动画，增加动感
                player.setAttribute('rotation', `0 0 ${-tilt * 0.5}`);
            }
        });

        // 识别反馈
        setInterval(() => {
            if(isStarted) {
                scanHint.style.display = marker.getAttribute('visible') ? 'none' : 'block';
            }
        }, 500);

        function startGameLoop() {
            setInterval(() => {
                if (marker.getAttribute('visible')) {
                    createFruit();
                }
            }, 1800); // 掉落间隔
        }

        function createFruit() {
            const fruit = document.createElement('a-entity');
            const randomModel = models[Math.floor(Math.random() * models.length)];
            
            let xPos = (Math.random() - 0.5) * 2.5; // 随机横向位置
            let yPos = 4; // 初始高度

            fruit.setAttribute('gltf-model', randomModel);
            fruit.setAttribute('scale', '0.07 0.07 0.07');
            fruit.setAttribute('position', `${xPos} ${yPos} 0`);
            dropZone.appendChild(fruit);

            const fallTick = setInterval(() => {
                yPos -= 0.06; // 掉落速度
                fruit.setAttribute('position', `${xPos} ${yPos} 0`);

                // 碰撞检测逻辑
                if (yPos < 0.4 && yPos > 0 && Math.abs(xPos - cupX) < 0.35) {
                    score += 10;
                    document.getElementById('score-ui').innerText = `SCORE: ${score}`;
                    clearInterval(fallTick);
                    fruit.remove();
                }

                // 落地移除
                if (yPos < -1) {
                    clearInterval(fallTick);
                    fruit.remove();
                }
            }, 25);
        }
    </script>
</body>
</html>
