<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR Side-View Collector - Final</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; text-align: center; }
        #score-ui { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); color: #00ffcc; font-size: 32px; font-weight: bold; z-index: 100; text-shadow: 0 0 15px rgba(0,255,204,0.6); pointer-events: none; }
        button { padding: 16px 45px; font-size: 18px; background: #00ffcc; border: none; border-radius: 35px; color: #000; font-weight: bold; cursor: pointer; }
    </style>
</head>

<body>
    <div id="overlay">
        <h1>AR 采集挑战</h1>
        <button id="start-btn">开始游戏</button>
    </div>

    <div id="score-ui">0</div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="logarithmicDepthBuffer: true; colorManagement: true;"
        vr-mode-ui="enabled: false">
        
        <a-assets timeout="180000">
            <a-asset-item id="cup-m" src="cup-v6.glb"></a-asset-item>
            <a-asset-item id="apple-m" src="apple-v2.glb"></a-asset-item>
            <a-asset-item id="kale-m" src="kale-v3.glb"></a-asset-item>
            <a-asset-item id="kugua-m" src="kugua-v4.glb"></a-asset-item>
            <a-asset-item id="lemon-m" src="lemon-v5.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="./poster.patt" id="game-marker">
            <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
            <a-entity light="type: directional; position: 0 5 2; intensity: 0.7;"></a-entity>

            <a-entity id="player-cup" 
                      gltf-model="#cup-m" 
                      scale="0.2 0.2 0.2" 
                      position="0 0.2 0"
                      rotation="-90 0 0">
            </a-entity>

            <a-entity id="drop-zone"></a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        let score = 0;
        let cupX = 0;
        let isStarted = false;
        const player = document.querySelector('#player-cup');
        const dropZone = document.querySelector('#drop-zone');
        const marker = document.querySelector('#game-marker');
        const models = ['#apple-m', '#kale-m', '#kugua-m', '#lemon-m'];

        document.getElementById('start-btn').addEventListener('click', function() {
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission();
            }
            startGameLoop();
        });

        window.addEventListener('deviceorientation', (e) => {
            if(!isStarted || !marker.getAttribute('visible')) return;
            let tilt = e.gamma; 
            if(Math.abs(tilt) > 1.5) {
                cupX += tilt * 0.005; 
                // 限制左右移动范围
                cupX = Math.max(-0.8, Math.min(0.8, cupX)); 
                player.setAttribute('position', `${cupX} 0.2 0`);
            }
        });

        function startGameLoop() {
            setInterval(() => {
                if (marker.getAttribute('visible')) {
                    createFruit();
                }
            }, 1800);
        }

        function createFruit() {
            const fruit = document.createElement('a-entity');
            const randomModel = models[Math.floor(Math.random() * models.length)];
            
            let xPos = (Math.random() - 0.5) * 1.6; 
            let zPos = -4; 
            let yPos = 0.2; 

            fruit.setAttribute('gltf-model', randomModel);
            // 【修改点2】扩大坠落物大小
            fruit.setAttribute('scale', '0.15 0.15 0.15');
            fruit.setAttribute('rotation', '90 0 0');
            fruit.setAttribute('position', `${xPos} ${yPos} ${zPos}`);
            dropZone.appendChild(fruit);

            const fallTick = setInterval(() => {
                zPos += 0.08; 
                fruit.setAttribute('position', `${xPos} ${yPos} ${zPos}`);

                // 【修改点3】配合大模型，扩大碰撞判定范围 (0.45)
                if (zPos > -0.2 && zPos < 0.2 && Math.abs(xPos - cupX) < 0.45) {
                    score += 10;
                    document.getElementById('score-ui').innerText = score;
                    clearInterval(fallTick);
                    fruit.remove();
                }

                if (zPos > 1.5) {
                    clearInterval(fallTick);
                    fruit.remove();
                }
            }, 25);
        }
    </script>
</body>
</html>
