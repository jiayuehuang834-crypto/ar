<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR Collection Game - Custom Poster</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; text-align: center; }
        #score-ui { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: #00ffcc; font-size: 24px; font-weight: bold; z-index: 100; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        button { padding: 15px 40px; font-size: 18px; background: #00ffcc; border: none; border-radius: 30px; color: #000; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #status-info { position: fixed; bottom: 20px; left: 10px; color: #0f0; background: rgba(0,0,0,0.5); font-size: 12px; z-index: 100; padding: 5px; }
    </style>
</head>

<body>
    <div id="overlay">
        <h1>AR 蔬果采集</h1>
        <p>对准你的自定义海报</p>
        <button id="start-btn">进入空间</button>
    </div>

    <div id="score-ui">得分: 0</div>
    <div id="status-info">状态: 等待扫描海报...</div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        renderer="logarithmicDepthBuffer: true; colorManagement: true;"
        vr-mode-ui="enabled: false">
        
        <a-assets timeout="120000">
            <a-asset-item id="cup-m" src="cup-v6.glb"></a-asset-item>
            <a-asset-item id="apple-m" src="apple-v2.glb"></a-asset-item>
            <a-asset-item id="kale-m" src="kale-v3.glb"></a-asset-item>
            <a-asset-item id="kugua-m" src="kugua-v4.glb"></a-asset-item>
            <a-asset-item id="lemon-m" src="lemon-v5.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="./poster.patt" id="game-marker">
            
            <a-sphere position="0 0.2 0" radius="0.1" color="red" opacity="0.8"></a-sphere>

            <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
            <a-entity light="type: directional; position: 0 5 0; intensity: 0.6;"></a-entity>

            <a-entity id="player-cup" 
                      gltf-model="#cup-m" 
                      scale="0.08 0.08 0.08" 
                      position="0 0.1 0">
            </a-entity>

            <a-entity id="drop-zone"></a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        let score = 0;
        let cupX = 0;
        let isStarted = false;
        const player = document.querySelector('#player-cup');
        const dropZone = document.querySelector('#drop-zone');
        const marker = document.querySelector('#game-marker');
        const statusText = document.querySelector('#status-info');
        const models = ['#apple-m', '#kale-m', '#kugua-m', '#lemon-m'];

        // 状态监测
        setInterval(() => {
            if (marker.getAttribute('visible')) {
                statusText.innerText = "状态: 已识别海报";
                statusText.style.color = "#0f0";
            } else {
                statusText.innerText = "状态: 正在寻找海报...";
                statusText.style.color = "#f00";
            }
        }, 500);

        document.getElementById('start-btn').addEventListener('click', function() {
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission();
            }
            startGameLoop();
        });

        window.addEventListener('deviceorientation', (e) => {
            if(!isStarted) return;
            let tilt = e.gamma; 
            if(Math.abs(tilt) > 1.5) {
                cupX += tilt * 0.006; 
                cupX = Math.max(-1.2, Math.min(1.2, cupX)); 
                player.setAttribute('position', `${cupX} 0.1 0`);
            }
        });

        function startGameLoop() {
            setInterval(() => {
                if (marker.getAttribute('visible')) {
                    createFruit();
                }
            }, 2000);
        }

        function createFruit() {
            const fruit = document.createElement('a-entity');
            const randomModel = models[Math.floor(Math.random() * models.length)];
            let xPos = (Math.random() - 0.5) * 2;
            let yPos = 4;

            fruit.setAttribute('gltf-model', randomModel);
            fruit.setAttribute('scale', '0.07 0.07 0.07');
            fruit.setAttribute('position', `${xPos} ${yPos} 0`);
            dropZone.appendChild(fruit);

            const fallTick = setInterval(() => {
                yPos -= 0.06;
                fruit.setAttribute('position', `${xPos} ${yPos} 0`);
                if (yPos < 0.4 && yPos > 0 && Math.abs(xPos - cupX) < 0.35) {
                    score += 10;
                    document.getElementById('score-ui').innerText = `得分: ${score}`;
                    clearInterval(fallTick);
                    fruit.remove();
                }
                if (yPos < -1) {
                    clearInterval(fallTick);
                    fruit.remove();
                }
            }, 25);
        }
    </script>
</body>
</html>
