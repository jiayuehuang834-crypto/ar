<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR Collector - Max Vision</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; text-align: center; }
        #score-ui { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); color: #00ffcc; font-size: 36px; font-weight: bold; z-index: 100; text-shadow: 0 0 20px rgba(0,255,204,0.7); pointer-events: none; }
        button { padding: 18px 50px; font-size: 20px; background: #00ffcc; border: none; border-radius: 40px; color: #000; font-weight: bold; cursor: pointer; box-shadow: 0 0 25px rgba(0,255,204,0.5); }
    </style>
</head>

<body>
    <div id="overlay">
        <h1 style="letter-spacing: 2px;">AR 采集挑战</h1>
        <p style="color: #888;">对准海报，感受巨型物体掉落</p>
        <button id="start-btn">开始游戏</button>
    </div>

    <div id="score-ui">0</div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="logarithmicDepthBuffer: true; colorManagement: true;"
        vr-mode-ui="enabled: false">
        
        <a-assets timeout="180000">
            <a-asset-item id="cup-m" src="cup-v6.glb"></a-asset-item>
            <a-asset-item id="apple-m" src="apple-v2.glb"></a-asset-item>
            <a-asset-item id="kale-m" src="kale-v3.glb"></a-asset-item>
            <a-asset-item id="kugua-m" src="kugua-v4.glb"></a-asset-item>
            <a-asset-item id="lemon-m" src="lemon-v5.glb"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="./poster.patt" id="game-marker">
            <a-entity light="type: ambient; intensity: 1.3;"></a-entity>
            <a-entity light="type: directional; position: 0 5 2; intensity: 0.8;"></a-entity>

            <a-entity id="player-cup" 
                      gltf-model="#cup-m" 
                      scale="0.35 0.35 0.35" 
                      position="0 0.3 0.5"
                      rotation="-90 0 0">
            </a-entity>

            <a-entity id="drop-zone"></a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        let score = 0;
        let cupX = 0;
        let isStarted = false;
        const player = document.querySelector('#player-cup');
        const dropZone = document.querySelector('#drop-zone');
        const marker = document.querySelector('#game-marker');
        const models = ['#apple-m', '#kale-m', '#kugua-m', '#lemon-m'];

        document.getElementById('start-btn').addEventListener('click', function() {
            document.getElementById('overlay').style.display = 'none';
            isStarted = true;
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission();
            }
            startGameLoop();
        });

        // 【移动逻辑优化】：
        // 1. 降低系数 (0.003)，操作更沉稳，解决灵敏度过高问题
        // 2. 缩小范围 (-0.6 到 0.6)，让杯子始终在屏幕视觉中心块移动
        window.addEventListener('deviceorientation', (e) => {
            if(!isStarted || !marker.getAttribute('visible')) return;
            let tilt = e.gamma; 
            if(Math.abs(tilt) > 2) {
                cupX += tilt * 0.003; 
                cupX = Math.max(-0.6, Math.min(0.6, cupX)); 
                player.setAttribute('position', `${cupX} 0.3 0.5`);
            }
        });

        function startGameLoop() {
            setInterval(() => {
                if (marker.getAttribute('visible')) {
                    createFruit();
                }
            }, 1600); // 稍微加快节奏
        }

        function createFruit() {
            const fruit = document.createElement('a-entity');
            const randomModel = models[Math.floor(Math.random() * models.length)];
            
            // 掉落范围与杯子移动范围匹配
            let xPos = (Math.random() - 0.5) * 1.2; 
            let zPos = -4.5; 
            let yPos = 0.3; 

            fruit.setAttribute('gltf-model', randomModel);
            // 【坠落物优化】：扩大为与之前杯子相当的大小 (0.25)
            fruit.setAttribute('scale', '0.25 0.25 0.25');
            fruit.setAttribute('rotation', '90 0 0');
            fruit.setAttribute('position', `${xPos} ${yPos} ${zPos}`);
            dropZone.appendChild(fruit);

            const fallTick = setInterval(() => {
                zPos += 0.09; // 速度稍微加快，配合巨大化的视觉效果
                fruit.setAttribute('position', `${xPos} ${yPos} ${zPos}`);

                // 【碰撞检测优化】：针对巨大化模型，将判定半径扩大到 0.6
                // 注意杯子现在在 z=0.5 处，所以判定区间设为 0.3 到 0.7
                if (zPos > 0.3 && zPos < 0.7 && Math.abs(xPos - cupX) < 0.6) {
                    score += 10;
                    document.getElementById('score-ui').innerText = score;
                    clearInterval(fallTick);
                    fruit.remove();
                }

                if (zPos > 2.5) {
                    clearInterval(fallTick);
                    fruit.remove();
                }
            }, 25);
        }
    </script>
</body>
</html>
